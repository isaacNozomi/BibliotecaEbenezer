name: Biblioteca Ebenezer – Compilación Robusta

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Descargar el código de la app
        uses: actions/checkout@v4

      - name: ☕ Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ⚙️ Preparar Gradle automáticamente
        uses: gradle/actions/setup-gradle@v3

      - name: 🏗️ Fabricar el APK de depuración
        run: gradle assembleDebug

      - name: 📦 Enviar el APK a la sección de Artefactos
        uses: actions/upload-artifact@v4
        with:
          name: BibliotecaEbenezer-APK
          path: app/build/outputs/apk/debug/*.apk
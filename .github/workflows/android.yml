name: Biblioteca Ebenezer – Ensamblaje Profesional

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Obtener el código fuente
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      # 2. Configurar Java 17 con cache de Gradle automática
      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. Inyectar el sistema de compilación Gradle oficial
      - name: ⚙️ Instalar y configurar Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. Compilar el APK de depuración
      - name: 🏗️ Construir APK debug
        run: gradle assembleDebug

      # 5. Subir el APK como artefacto (solo si existe)
      - name: 📦 Entregar APK
        uses: actions/upload-artifact@v4
        with:
          name: BibliotecaEbenezer-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error   # Falla si no hay APK, para que sepas que algo salió mal
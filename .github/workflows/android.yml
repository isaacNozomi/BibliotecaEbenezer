name: Biblioteca Ebenezer – Compilación Limpia y Profesional

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Obtener código fuente
        uses: actions/checkout@v4

      - name: 🧹 Limpiar cachés y archivos residuales de Gradle
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper
          rm -rf app/build

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ⚙️ Instalar Gradle 8.7 automáticamente
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"
          cache-disabled: true

      - name: 🏗️ Compilar APK con trazas detalladas
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: 📦 Subir APK (solo si se generó)
        uses: actions/upload-artifact@v4
        with:
          name: BibliotecaEbenezer-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
name: Biblioteca Ebenezer - Construcción Profesional

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Descargar código fuente
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔧 Dar permisos al wrapper de Gradle
        run: chmod +x gradlew

      - name: 🏗️ Construir APK de depuración
        run: ./gradlew assembleDebug --no-daemon

      - name: 📦 Subir el APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: BibliotecaEbenezer-APK
          path: app/build/outputs/apk/debug/*.apk